<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>회전문 트래커</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="app">
    <div id="sc-home" class="sc on">
      <div class="tbar"><h2>홈</h2></div>
      <div class="stit">다가올 관람 일정</div>
      <div id="home-ticket-list" style="padding: 0 20px;"></div>
    </div>

    <div id="sc-cal" class="sc">
      <div class="tbar">
        <div style="display:flex; align-items:center; gap:10px;">
          <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
          <h2 id="cal-month-label" style="min-width: 80px; text-align:center;"></h2>
          <button class="cal-nav" onclick="changeMonth(1)">›</button>
        </div>
        <button class="rbtn" onclick="openRecordModal()">+ 관람 등록</button>
      </div>
      <div style="padding: 10px 20px; display: flex; gap: 8px;">
        <select class="inp" id="filter-show" style="margin-bottom:0; padding:8px;" onchange="updateActorFilter()"></select>
        <select class="inp" id="filter-actor" style="margin-bottom:0; padding:8px;" onchange="loadCalendar()"></select>
      </div>
      <div class="cal-header">
        <span style="color:#C0392B;">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span style="color:#2A5FA8;">토</span>
      </div>
      <div id="calendar-grid" class="cal-grid"></div>
    </div>

    <div id="sc-stamp" class="sc">
      <div class="tbar">
        <h2>도장판 & 혜택</h2>
        <button class="rbtn" onclick="openShowModal()">+ 공연 추가</button>
      </div>
      <div id="stamp-list-area" style="padding: 20px;"></div>
      <div id="stamp-detail-area" style="display:none; padding: 20px; background: #111520; min-height: 100%;"></div>
    </div>

    <div id="sc-settings" class="sc">
      <div class="tbar"><h2>설정</h2></div>
      <div style="padding: 20px;">
        <button class="mbtn p" style="width:100%; margin-bottom:14px;" onclick="exportData()">⬇ 데이터 백업 (JSON)</button>
        <button class="mbtn s" style="width:100%;" onclick="document.getElementById('import-file').click()">⬆ 데이터 복원</button>
        <input type="file" id="import-file" style="display:none;" accept=".json" onchange="importData(event)">
      </div>
    </div>

    <div class="bnav">
      <button class="ni on" onclick="navigate('home', this)"><div class="ni-ico">🎫</div><div class="ni-lbl">홈</div></button>
      <button class="ni" onclick="navigate('cal', this)"><div class="ni-ico">📅</div><div class="ni-lbl">캘린더</div></button>
      <button class="ni" onclick="navigate('stamp', this)"><div class="ni-ico">🎯</div><div class="ni-lbl">도장판</div></button>
      <button class="ni" onclick="navigate('settings', this)"><div class="ni-ico">⚙️</div><div class="ni-lbl">설정</div></button>
    </div>
  </div>

  <div class="ov" id="m-show">
    <div class="modal">
      <h3 id="show-modal-title">새 공연 추가</h3>
      <input type="hidden" id="edit-show-id">
      
      <label class="lbl">공연명</label>
      <input class="inp" type="text" id="add-show-name" placeholder="예: 시데레우스">

      <label class="lbl">캘린더 표시 색상 (맞춤 설정)</label>
      <div style="display: flex; gap: 10px; margin-bottom: 14px;">
        <input type="color" id="add-show-color-picker" value="#7C5CBF" style="width: 50px; height: 44px; border: none; cursor: pointer; padding: 0; background: none;" oninput="document.getElementById('add-show-color-hex').value = this.value">
        <input class="inp" type="text" id="add-show-color-hex" value="#7C5CBF" style="margin-bottom: 0;" oninput="document.getElementById('add-show-color-picker').value = this.value">
      </div>

      <label class="lbl">도장판 혜택 설정 (예: 5회 관람 시 40% 할인)</label>
      <div id="reward-rows-container"></div>
      <button class="mbtn s" style="width:100%; padding:10px; margin-bottom:14px; font-size:13px;" onclick="addRewardRow()">+ 혜택 구간 추가</button>

      <div class="brow" id="show-action-btns"></div>
    </div>
  </div>

  <div class="ov" id="m-record">
    <div class="modal">
      <h3 id="record-modal-title">관람 등록</h3>
      <input type="hidden" id="edit-record-id">

      <label class="lbl">공연 선택</label>
      <select class="inp" id="r-show" onchange="updateRecordFormDeps()"></select>
      
      <div style="display: flex; gap: 10px;">
        <div style="flex:1;">
          <label class="lbl">날짜</label>
          <input class="inp" type="date" id="r-date">
        </div>
        <div style="flex:1;">
          <label class="lbl">시간 (수기)</label>
          <input class="inp" type="text" id="r-time" placeholder="예: 14:00">
        </div>
      </div>

      <label class="lbl">캐스팅 (쉼표 구분)</label>
      <input class="inp" type="text" id="r-cast" placeholder="예: 홍길동, 이순신">

      <label class="lbl">도장판 선택</label>
      <select class="inp" id="r-pad"></select>

      <label class="lbl">할인권종 사용</label>
      <select class="inp" id="r-discount"></select>

      <label class="lbl">좌석 정보</label>
      <input class="inp" type="text" id="r-seat" placeholder="예: 1층 B구역 12열 14번">

      <label class="lbl">도장 적립 배율</label>
      <div class="trow" id="r-multi">
        <button class="tgl on" onclick="selectMulti(1, this)">1개</button>
        <button class="tgl" onclick="selectMulti(2, this)">더블 x2</button>
        <button class="tgl" onclick="selectMulti(3, this)">트리플 x3</button>
      </div>

      <label class="lbl">예매 내역서 첨부</label>
      <input class="inp" type="file" id="r-image" accept="image/*">
      <div id="r-image-preview" style="font-size: 12px; color: var(--purple); margin-bottom: 14px;"></div>

      <label class="lbl">메모</label>
      <input class="inp" type="text" id="r-memo" placeholder="특이사항">

      <div class="brow" id="record-action-btns"></div>
    </div>
  </div>

  <div class="ov" id="m-wallet">
    <div class="modal">
      <h3>지갑 수동 조작</h3>
      <input type="hidden" id="w-show-id">
      <label class="lbl">조작할 할인권/혜택</label>
      <select class="inp" id="w-label"></select>
      
      <div style="display: flex; gap: 10px;">
        <div style="flex:1;">
          <label class="lbl">유형</label>
          <select class="inp" id="w-type">
            <option value="add">추가 지급 (+)</option>
            <option value="sub">수동 사용 (-)</option>
          </select>
        </div>
        <div style="flex:1;">
          <label class="lbl">수량</label>
          <input class="inp" type="number" id="w-amount" value="1" min="1">
        </div>
      </div>
      <div class="brow">
        <button class="mbtn s" onclick="closeModal('m-wallet')">취소</button>
        <button class="mbtn p" onclick="saveWalletManual()">적용</button>
      </div>
    </div>
  </div>

  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
